<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europe through time</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header>
    <h1>Europe through time</h1>
    <div class="subtitle">3000 BC &mdash; now</div>
  </header>

  <div class="panel">
    <div class="year-display">
      <div class="year-number" id="yearNumber">476</div>
      <div class="era-label" id="eraLabel">Val van het West-Romeinse Rijk</div>
    </div>

    <div class="slider-row">
      <input type="range" id="yearSlider" min="-3000" max="2026" value="476" step="1">
      <div class="slider-ticks">
        <span>3000 BC</span>
        <span>now</span>
      </div>
    </div>

    <div class="era-presets" id="eraPresets"></div>

    <div class="map-wrap">
      <svg id="map" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Map of Europe with clickable countries"></svg>
    </div>

    <div class="hint">Click on a dot to see what the country looked like in this year</div>
  </div>
</div>

<div class="image-fullscreen" id="imageFullscreen">
  <img id="fullscreenImg" src="" alt="Fullscreen historical image">
  <div class="zoom-controls">
    <button id="zoomOutBtn" aria-label="Zoom uit">−</button>
    <button id="zoomInBtn" aria-label="Zoom in">+</button>
    <button id="zoomResetBtn" aria-label="Reset zoom">⟲</button>
  </div>
  <div class="zoom-level" id="zoomLevel">100%</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-image-container">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <button class="zoom-btn" id="zoomBtn" aria-label="Zoom image">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.58 4.23-1.53l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <div class="modal-image" id="modalImage"></div>
    </div>
    <div class="modal-body">
      <p class="modal-city" id="modalCity">Rome</p>
      <p class="modal-year" id="modalYear">476</p>
      <p class="modal-desc" id="modalDesc"></p>
    </div>
  </div>
</div>
<script src="countryYearModifiers.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
